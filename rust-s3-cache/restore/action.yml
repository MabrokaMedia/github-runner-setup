name: Rust S3 cache (restore)
description: Restore cargo registry + target/ from same-region S3. Pair with rust-s3-cache/save.
author: MabrokaMedia

inputs:
  workspace:
    description: Path to the cargo workspace (where Cargo.lock + target/ live).
    required: true
  bucket:
    description: S3 bucket name.
    required: false
    default: mabroka-ci-cache
  region:
    description: AWS region.
    required: false
    default: us-east-1
  key-prefix:
    description: Extra prefix for cache key.
    required: false
    default: ${{ github.repository }}
  shared-key:
    description: Override key (skips Cargo.lock hash) — use for a single cache across branches.
    required: false
    default: ""

outputs:
  cache-hit:
    description: "true if cache was restored, false otherwise"
    value: ${{ steps.restore.outputs.cache-hit }}
  key:
    description: "The full S3 key used (so save can match)"
    value: ${{ steps.key.outputs.key }}
  workspace-abs:
    description: "Resolved absolute path to workspace"
    value: ${{ steps.key.outputs.workspace-abs }}

runs:
  using: composite
  steps:
    - name: Compute cache key
      id: key
      shell: bash
      run: |
        set -euo pipefail
        WORKSPACE_ABS="$(cd "${{ inputs.workspace }}" && pwd)"
        echo "workspace-abs=${WORKSPACE_ABS}" >> "$GITHUB_OUTPUT"
        if [[ -n "${{ inputs.shared-key }}" ]]; then
          KEY="${{ inputs.key-prefix }}/${{ inputs.shared-key }}"
        else
          HASH=$(find "${WORKSPACE_ABS}" -type d -name target -prune -o -type f -name Cargo.lock -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1 | head -c 16)
          KEY="${{ inputs.key-prefix }}/rust/${HASH}"
        fi
        echo "key=${KEY}" >> "$GITHUB_OUTPUT"
        echo "cache key: ${KEY}"
        echo "workspace (absolute): ${WORKSPACE_ABS}"

    - name: Restore cache from S3
      id: restore
      shell: bash
      env:
        AWS_DEFAULT_REGION: ${{ inputs.region }}
        BUCKET: ${{ inputs.bucket }}
        KEY: ${{ steps.key.outputs.key }}
        WORKSPACE_ABS: ${{ steps.key.outputs.workspace-abs }}
      run: |
        set -euo pipefail
        command -v zstd >/dev/null || sudo dnf install -y zstd >/dev/null 2>&1 || sudo apt-get install -y zstd >/dev/null 2>&1
        CARGO_ROOT="${CARGO_HOME:-$HOME/.cargo}"
        mkdir -p "${WORKSPACE_ABS}/target" "${CARGO_ROOT}/registry" "${CARGO_ROOT}/git"
        if aws s3api head-object --bucket "${BUCKET}" --key "${KEY}.tar.zst" >/dev/null 2>&1; then
          SIZE=$(aws s3api head-object --bucket "${BUCKET}" --key "${KEY}.tar.zst" --query ContentLength --output text)
          echo "cache HIT: s3://${BUCKET}/${KEY}.tar.zst (${SIZE} bytes)"
          aws s3 cp "s3://${BUCKET}/${KEY}.tar.zst" - --no-progress \
            | zstd -d --long=27 \
            | tar -xf - -C /
          echo "cache-hit=true" >> "$GITHUB_OUTPUT"
        else
          echo "cache MISS: s3://${BUCKET}/${KEY}.tar.zst"
          echo "cache-hit=false" >> "$GITHUB_OUTPUT"
        fi
